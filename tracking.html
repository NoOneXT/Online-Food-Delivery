<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Tracking - BiteRush</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .tracking-container {
      max-width: 800px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 3rem;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }

    .tracking-header {
      margin-bottom: 3rem;
    }
    
    .tracking-header h1 {
      color: var(--primary);
    }

    .progress-bar {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin-bottom: 3rem;
      padding: 0 1rem;
    }

    .progress-bar::before {
      content: '';
      position: absolute;
      top: 25px;
      left: 10%;
      right: 10%;
      height: 4px;
      background: var(--border-color);
      z-index: 1;
    }

    .progress-line {
      position: absolute;
      top: 25px;
      left: 10%;
      height: 4px;
      background: var(--primary);
      z-index: 2;
      width: 0%;
      transition: width 0.5s ease;
    }

    .step {
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 25%;
    }

    .step-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--surface);
      border: 4px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--text-muted);
      transition: var(--transition);
      background: white;
    }

    .step.active .step-icon {
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 15px rgba(216, 90, 48, 0.3);
    }

    .step.completed .step-icon {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .step-title {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .step.active .step-title,
    .step.completed .step-title {
      color: var(--text-main);
    }

    .eta-box {
      background: #FFF3ED;
      padding: 1.5rem;
      border-radius: var(--radius);
      display: inline-block;
      margin-top: 2rem;
      border: 1px solid rgba(216, 90, 48, 0.2);
    }

    .eta-box h3 { margin: 0; color: var(--primary); font-size: 1.8rem; }
    .eta-box p { margin: 0; font-weight: 500; }
    
    .map-placeholder {
      margin-top: 3rem;
      height: 250px;
      background: #E9ECEF;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1.2rem;
      border: 2px dashed #CED4DA;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">
      <i class="fa-solid fa-burger"></i> BiteRush
    </a>
  </nav>

  <main class="container">
    <div class="tracking-container">
      <div class="tracking-header">
        <h1>Order Confirmed!</h1>
        <p>Order #BR-90342</p>
      </div>

      <div class="progress-bar">
        <div class="progress-line" id="progress-line"></div>
        
        <div class="step completed" id="step-1">
          <div class="step-icon"><i class="fa-solid fa-receipt"></i></div>
          <div class="step-title">Placed</div>
        </div>
        
        <div class="step active" id="step-2">
          <div class="step-icon"><i class="fa-solid fa-fire-burner"></i></div>
          <div class="step-title">Preparing</div>
        </div>
        
        <div class="step" id="step-3">
          <div class="step-icon"><i class="fa-solid fa-motorcycle"></i></div>
          <div class="step-title">Out for Delivery</div>
        </div>
        
        <div class="step" id="step-4">
          <div class="step-icon"><i class="fa-solid fa-house-chimney"></i></div>
          <div class="step-title">Delivered</div>
        </div>
      </div>

      <div class="eta-box">
        <p>Estimated Arrival</p>
        <h3 id="eta-time">45 mins</h3>
      </div>

      <div class="map-placeholder">
        <span><i class="fa-solid fa-map-location-dot"></i> Live Map Tracking Unavailable in Demo</span>
      </div>
      
      <div style="margin-top: 3rem;">
        <a href="index.html" class="btn btn-secondary">Back to Home</a>
      </div>
    </div>
  </main>

  <script src="scripts/app.js"></script>
  <script>
    // Simulate order progress
    document.addEventListener('DOMContentLoaded', () => {
      const line = document.getElementById('progress-line');
      const etaTime = document.getElementById('eta-time');
      
      // Initial state
      line.style.width = '16%'; // Between step 1 and 2

      // Move to Out for delivery
      setTimeout(() => {
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-2').classList.add('completed');
        document.getElementById('step-3').classList.add('active');
        line.style.width = '50%';
        etaTime.innerText = '15 mins';
      }, 5000); // 5 sec demo

      // Move to Delivered
      setTimeout(() => {
        document.getElementById('step-3').classList.remove('active');
        document.getElementById('step-3').classList.add('completed');
        document.getElementById('step-4').classList.add('completed');
        document.getElementById('step-4').classList.add('active');
        line.style.width = '83%';
        etaTime.innerText = 'Arrived!';
        document.querySelector('.tracking-header h1').innerText = 'Bon Appétit!';
      }, 10000); // 10 sec demo
    });
  </script>
</body>
</html>
