<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart Checkout - BiteRush</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .checkout-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
      margin-top: 1rem;
    }
    
    @media(max-width: 768px) {
      .checkout-layout { grid-template-columns: 1fr; }
    }

    .cart-section, .summary-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
    }

    .cart-item {
      display: flex;
      align-items: center;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border-color);
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .item-img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      margin-right: 1.5rem;
    }

    .item-details {
      flex: 1;
    }
    
    .item-details h4 { margin-bottom: 0.25rem; font-size: 1.1rem; }
    .item-details p { color: var(--primary); font-weight: 600; }

    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--bg-color);
      border-radius: 50px;
      padding: 0.3rem 0.8rem;
    }

    .quantity-controls button {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-main);
      padding: 0.2rem 0.5rem;
    }
    .quantity-controls button:hover { color: var(--primary); }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    
    .summary-row.total {
      font-size: 1.25rem;
      font-weight: 700;
      border-top: 1px solid var(--border-color);
      padding-top: 1rem;
      margin-top: 1rem;
      color: var(--primary);
    }

    .checkout-btn {
      width: 100%;
      margin-top: 2rem;
      padding: 1rem;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">
      <i class="fa-solid fa-burger"></i> BiteRush
    </a>
    <a href="cart.html" class="cart-icon">
      <i class="fa-solid fa-cart-shopping"></i>
      <span class="cart-badge" id="cart-count">0</span>
    </a>
  </nav>

  <main class="container">
    <a href="javascript:history.back()" class="back-link"><i class="fa-solid fa-arrow-left"></i> Continue Shopping</a>
    
    <h1>Confirm Your Order</h1>

    <div class="checkout-layout">
      <div class="cart-section" id="cart-items-container">
        <!-- Injected via JS -->
      </div>
      
      <div class="summary-section">
        <h3>Order Summary</h3>
        <p id="restaurant-name-summary" style="margin-bottom: 1.5rem; font-size: 0.9rem;"></p>
        
        <div id="summary-details">
          <!-- Injected via JS -->
        </div>
        
        <button class="btn checkout-btn" id="proceed-checkout-btn" onclick="proceedToCheckout()">
          Proceed to Payment <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
        </button>
      </div>
    </div>
  </main>

  <script src="scripts/data.js"></script>
  <script src="scripts/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderCart();
    });

    function renderCart() {
      const cart = window.cartManager.cart;
      const container = document.getElementById('cart-items-container');
      const summaryDetails = document.getElementById('summary-details');
      const restaurantNameSummary = document.getElementById('restaurant-name-summary');
      const checkoutBtn = document.getElementById('proceed-checkout-btn');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-basket-shopping"></i>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added any delicious food yet.</p>
            <a href="index.html" class="btn" style="margin-top: 1rem;">Browse Restaurants</a>
          </div>
        `;
        restaurantNameSummary.textContent = '';
        summaryDetails.innerHTML = '';
        checkoutBtn.style.display = 'none';
        return;
      }

      // Render items
      container.innerHTML = '<h3>Items</h3>';
      cart.forEach(item => {
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <img src="${item.image}" alt="${item.name}" class="item-img">
          <div class="item-details">
            <h4>${item.name}</h4>
            <p>$${item.price.toFixed(2)}</p>
          </div>
          <div class="quantity-controls">
            <button onclick="updateQty(${item.id}, ${item.quantity - 1})"><i class="fa-solid fa-minus"></i></button>
            <span style="font-weight: 600; min-width: 20px; text-align: center;">${item.quantity}</span>
            <button onclick="updateQty(${item.id}, ${item.quantity + 1})"><i class="fa-solid fa-plus"></i></button>
          </div>
        `;
        container.appendChild(div);
      });

      // Render summary
      restaurantNameSummary.innerHTML = `Ordering from: <strong>${cart[0].restaurantName}</strong>`;
      
      const subtotal = window.cartManager.getTotalPrice();
      const tax = subtotal * 0.1; // 10% tax
      const deliveryFee = 2.99;
      const total = subtotal + tax + deliveryFee;

      summaryDetails.innerHTML = `
        <div class="summary-row">
          <span>Subtotal</span>
          <span>$${subtotal.toFixed(2)}</span>
        </div>
        <div class="summary-row">
          <span>Taxes (10%)</span>
          <span>$${tax.toFixed(2)}</span>
        </div>
        <div class="summary-row">
          <span>Delivery Fee</span>
          <span>$${deliveryFee.toFixed(2)}</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span>$${total.toFixed(2)}</span>
        </div>
      `;
      checkoutBtn.style.display = 'block';
    }

    // Global
    window.updateQty = (itemId, qty) => {
      window.cartManager.updateQuantity(itemId, qty);
      renderCart(); // re-render
    };

    window.proceedToCheckout = () => {
      const btn = document.getElementById('proceed-checkout-btn');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
      btn.disabled = true;
      
      setTimeout(() => {
        // Clear cart on successful order
        window.cartManager.clearCart();
        window.location.href = 'tracking.html';
      }, 1500);
    };
  </script>
</body>
</html>
